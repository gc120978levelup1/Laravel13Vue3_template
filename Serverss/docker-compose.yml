
networks:
  static-network:
    ipam:
      driver: default
      config:
        - subnet: 192.168.0.0/16 # Define the subnet for the network

services:
  pghost:
    image: postgres:16 # Use the official PostgreSQL image from Docker Hub
    restart: always # Ensures the container restarts if it fails
    container_name: 'database-pgsql-server'
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
      PGDATA: /data/postgres
    ports:
      - '54321:5432' # Maps the container's port 5432 to the host machine's port 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s # Grace period for the DB to initialize on first run
    volumes:
      - postgres_data:/data/postgres # Persists data to a named volume
    networks:
      static-network:
        ipv4_address: 192.168.0.20 # Assign the static IP

  redis:
    image: 'redis:latest'
    container_name: 'my-redis-server'
    restart: 'always'
    volumes:
      - './redis-data:/data'
    ports:
      - 6379:6379
    environment:
      - REDIS_ARGS=--requirepass my_redis_password --appendonly yes
    networks:
      static-network:
        ipv4_address: 192.168.0.40 # Assign the static IP

  adminer:
    image: adminer:latest
    container_name: 'php-adminer-db-admin'
    restart: 'always'
    ports:
      - 8081:8080
    environment:
      ADMINER_DEFAULT_SERVER: 'pghost'
    depends_on:
      pghost:
         condition: service_healthy
    networks:
      static-network:
        ipv4_address: 192.168.0.60 # Assign the static IP

volumes:
  postgres_data: # Defines the named volume for data persistence
